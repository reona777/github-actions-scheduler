name: 週次 GAS Webアプリ トリガー

on:
  schedule:
    # 毎週月曜 9:00 JST（UTC 0:00）に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  trigger-gas:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: GAS Webアプリ エンドポイントを呼び出す
        env:
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: |
          python scripts/trigger_gas.py \
            --url "$GAS_WEBHOOK_URL" \
            --payload '{"action": "weeklyReport", "triggered_by": "github-actions"}'

      - name: 完了通知を Slack へ送信
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG=":calendar: 週次GASトリガーが完了しました。"
          else
            MSG=":x: 週次GASトリガーでエラーが発生しました。"
          fi
          python scripts/notify_slack.py --message "$MSG"
